name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin Version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: emdash-version
    attributes:
      label: EmDash Version
      placeholder: e.g., ^0.12.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Console Output
      render: shell
